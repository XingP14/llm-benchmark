version: '3.8'

services:
  llm-bench:
    build: ./docker
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:-llm-bench-secret-change-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - PORT=3000
      - DB_PATH=/app/data/llm-bench.db
