services:
  llm-bench:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: llm-bench
    ports:
      - "192.168.160.14:3033:3033"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET before running docker compose}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD before running docker compose}
      - PORT=3033
      - DB_PATH=/app/data/llm-bench.db
    restart: unless-stopped
